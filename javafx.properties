<?xml version="1.0" encoding="UTF-8"?>

<?import javafx.geometry.Insets?>
<?import javafx.scene.control.Button?>
<?import javafx.scene.control.Label?>
<?import javafx.scene.control.ListView?>
<?import javafx.scene.layout.BorderPane?>
<?import javafx.scene.layout.HBox?>
<?import javafx.scene.layout.VBox?>
<?import javafx.scene.text.Font?>
<?import javafx.scene.text.Text?>

<BorderPane prefHeight="700.0" prefWidth="360.0" style="-fx-background-color: #f3f4f6;" xmlns="http://javafx.com/javafx/19" xmlns:fx="http://javafx.com/fxml/1" fx:controller="controller.TrainSelectionController">

   <top>
       <VBox style="-fx-background-color: #1e3a8a; -fx-padding: 20;">
           <Button text="←" onAction="#handleBack" textFill="WHITE" style="-fx-background-color: transparent; -fx-font-size: 20px; -fx-cursor: hand; -fx-padding: 0;"/>
           
           <VBox spacing="5" alignment="CENTER">
               <padding><Insets top="10" bottom="10"/></padding>
               
               <Label fx:id="routeLabel" text="Asal (XXX) ➝ Tujuan (XXX)" textFill="WHITE">
                   <font><Font name="System Bold" size="16.0"/></font>
               </Label>
               
               <Label fx:id="dateLabel" text="Sabtu, 2 November 2025" textFill="#e5e7eb">
                   <font><Font size="12.0"/></font>
               </Label>
           </VBox>
       </VBox>
   </top>

   <center>
       <ListView fx:id="trainListView" style="-fx-background-color: transparent; -fx-control-inner-background: #f3f4f6; -fx-padding: 10;"/>
   </center>

</BorderPane>